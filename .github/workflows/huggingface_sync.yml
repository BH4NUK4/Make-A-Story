name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Navigate into your backend folder 
          # (CHANGE 'backend' TO THE EXACT NAME OF YOUR FOLDER)
          cd backend 
          
          # 2. Create a temporary git repository just for this folder
          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git checkout -b main
          git add .
          git commit -m "Deploy backend to Hugging Face"
          
          # 3. Force push ONLY this folder to the Hugging Face main branch
          git push --force https://BH4NUK4:$HF_TOKEN@huggingface.co/spaces/BH4NUK4/story-generator-api main:main
